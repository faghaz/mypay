<!DOCTYPE html>
<html>
<head>
    <title>Post Product</title>
</head>
<body>
    <h1>Post Product</h1>
    <a href="/events">Back to Products</a><br><br>

    <form method="POST" enctype="multipart/form-data">
        <input name="title" placeholder="Event Title" required><br><br>
        <input name="location" placeholder="Location" required><br><br>
        <input type="date" name="date" required><br><br>
        <textarea name="description" placeholder="Description"></textarea><br><br>
        <input type="number" name="price" placeholder="Price"><br><br>

        <h3>Address</h3>
        <input name="zip_code" placeholder="Zip Code"><br><br>
        <input name="street" placeholder="Street"><br><br>
        <input name="city" placeholder="City"><br><br>
<input name="zip_code" placeholder="Zip Code"><br><br>
<input name="street" placeholder="Street"><br><br>
<input name="city" placeholder="City"><br><br>

<!-- COUNTRY -->
<select name="country" id="country" onchange="updateStates()" required>
    <option value="">Select Country</option>
    {% for c in countries %}
        <option value="{{ c }}">{{ c }}</option>
    {% endfor %}
</select><br><br>

<!-- STATE -->
<select name="state" id="state" required>
    <option value="">Select State</option>
</select><br><br>

<script>
    const states = {{ states | tojson }};

    function updateStates() {
        const country = document.getElementById("country").value;
        const stateSelect = document.getElementById("state");

        stateSelect.innerHTML = '<option value="">Select State</option>';

        if (states[country]) {
            states[country].forEach(function(state) {
                let option = document.createElement("option");
                option.value = state;
                option.text = state;
                stateSelect.appendChild(option);
            });
        }
    }
</script>

        <input type="file" name="image"><br><br>
        <button type="submit">Post Product</button>
    </form>
</body>
</html>
